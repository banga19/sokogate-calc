stages:
  - lint
  - test
  - build
  - deploy

variables:
  DOCKER_REGISTRY: registry.gitlab.com
  IMAGE_TAG: $CI_COMMIT_SHA

# Linting stage
lint:
  stage: lint
  image: node:18-alpine
  script:
    - npm ci
    - npm run lint || true
    - npm audit --audit-level moderate || true
  only:
    - merge_requests
    - main

# Testing stage
test:
  stage: test
  image: node:18-alpine
  script:
    - npm ci
    - npm test -- --ci --coverage
  artifacts:
    paths:
      - coverage/
    expire_in: 1 week
  only:
    - merge_requests
    - main

# Build and push
build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - |
      docker build \
        --target runtime \
        -t $CI_REGISTRY_IMAGE:$IMAGE_TAG \
        -t $CI_REGISTRY_IMAGE:latest \
        .
    - docker push $CI_REGISTRY_IMAGE:$IMAGE_TAG
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main
    - tags

# Deploy to production (manual)
deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
  script:
    - echo "$PROD_SSH_KEY" > private.key
    - chmod 600 private.key
    - |
      ssh -i private.key -o StrictHostKeyChecking=no \
        $PROD_USER@$PROD_HOST << 'EOF'
        docker pull $CI_REGISTRY_IMAGE:$IMAGE_TAG
        docker stop sokogate-calculator || true
        docker rm sokogate-calculator || true
        docker run -d \
          --name sokogate-calculator \
          --restart unless-stopped \
          -p 3000:3000 \
          --env-file .env \
          $CI_REGISTRY_IMAGE:$IMAGE_TAG
        sleep 5
        curl -f http://localhost:3000/Calculate/health || exit 1
      EOF
    - rm -f private.key
  environment:
    name: production
    url: https://ultimotradingltd.co.ke/Calculate
  only:
    - tags
  when: manual