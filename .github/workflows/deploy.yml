name: Deploy Sokogate Calculator

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'  # Semantic versioning tags
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: LINT & TEST
  # ═══════════════════════════════════════════════════════════════
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true  # Don't fail on lint warnings

      - name: Run security audit
        run: npm audit --audit-level moderate
        continue-on-error: true

      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Upload test coverage
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-coverage
          path: coverage/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: BUILD & PUSH DOCKER IMAGE
  # ═══════════════════════════════════════════════════════════════
  build-and-push:
    name: Build & Push Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: DEPLOY TO STAGING (on PR merge to main)
  # ═══════════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          script: |
            # Pull latest image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main

            # Stop current container
            docker stop sokogate-calculator || true
            docker rm sokogate-calculator || true

            # Run new container
            docker run -d \
              --name sokogate-calculator \
              --restart unless-stopped \
              -p 3000:3000 \
              --env-file .env \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main

            # Wait for health check
            sleep 5
            curl -f http://localhost:3000/Calculate/health || exit 1

      - name: Notify staging deployment
        run: echo "✅ Staging deployment complete"

  # ═══════════════════════════════════════════════════════════════
  # JOB 4: DEPLOY TO PRODUCTION (manual approval or tag)
  # ═══════════════════════════════════════════════════════════════
  deploy-production:
    name: Deploy to Production
    needs: [build-and-push, deploy-staging]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials (for ECS/EKS)
        if: contains(needs.build-and-push.outputs.deploy-target, 'aws')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to production (Rolling Update)
        uses: appleboy/ssh-action@v1.0.1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            # Tag from Git (e.g., v1.2.3)
            TAG=${GITHUB_REF#refs/tags/}
            echo "Deploying tag: $TAG"

            # Pull new image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG

            # Rolling update strategy
            # 1. Start new container alongside old one
            docker run -d \
              --name sokogate-calculator-new \
              --restart unless-stopped \
              -p 3001:3000 \
              --env-file .env \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG

            # 2. Wait for new container to be healthy
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3001/Calculate/health > /dev/null; then
                echo "New container healthy"
                break
              fi
              echo "Waiting for health check... ($i/30)"
              sleep 2
            done

            # 3. Switch traffic (stop old, rename new)
            docker stop sokogate-calculator || true
            docker rm sokogate-calculator || true
            docker rename sokogate-calculator-new sokogate-calculator

            # 4. Cleanup old images (keep last 5)
            docker image prune -a -f --filter "until=72h"

            echo "✅ Production deployment complete"

      - name: Notify production deployment
        run: |
          echo "🚀 Production deployed: ${{ github.ref_name }}"